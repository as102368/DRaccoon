<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DRaccoon - Test Following</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app"></div>
  <script src="./vendor/vue.global.js"></script>
  <script>
    (function () {
      const handlers = {
        themeChanged: [],
        shortcutTriggered: [],
        downloadProgress: [],
        downloadLog: [],
        downloadFinished: [],
        syncProgress: [],
        syncLog: [],
        syncFinished: [],
        relationProgress: [],
        relationLog: [],
        relationFinished: [],
        reportProgress: [],
        reportLog: [],
        reportFinished: [],
        transcriptProgress: [],
        transcriptLog: [],
        transcriptFinished: [],
        cloudProgress: [],
        cloudLog: [],
        cloudFinished: [],
        userWorksProgress: [],
        userWorksLog: [],
        userWorksFinished: [],
      };
      function emit(name, payload) {
        handlers[name].forEach(fn => {
          try { fn(payload); } catch (e) { console.error(e); }
        });
      }
      window.electronAPI = {
        getSettings: () => Promise.resolve({
          outputPath: 'C:\\Users\\EDY\\Downloads\\DouyinDownloaded',
          cookieString: 'test=1',
          thread: 5,
          retryTimes: 3,
          proxy: '',
          cover: true,
          music: true,
          avatar: true,
          database: true,
          folderstyle: false,
          videoQuality: 'highest',
          syncLimits: { favorites: 1000, collections: 200, likes: 1000, following: 2000 },
          retention: 'forever',
          theme: 'dark',
          pythonPath: '',
          shortcuts: { enabled: true, pasteDownload: 'Ctrl+Shift+V', toggleWindow: 'Ctrl+Shift+D', pauseAll: 'Ctrl+Shift+P' },
          relation: { minDelay: 2, maxDelay: 4, dryRun: false },
          transcript: { enabled: false, mode: 'api', apiKey: '', model: 'gpt-4o-mini-transcribe', formats: ['srt', 'txt'], language: 'zh' },
          cloudSync: { enabled: false, provider: '', accessKeyId: '', accessKeySecret: '', bucket: '', region: '', endpoint: '' },
        }),
        setSettings: () => Promise.resolve(true),
        validateCookie: () => Promise.resolve({ valid: true, user: { nickname: '测试用户', avatar: '', sec_uid: 'self', unique_id: 'testuser' } }),
        listArchive: () => Promise.resolve([
          { name: '20240101_视频1_作者A', path: 'x', files: [], videos: [], videoCount: 1, mtime: '2024-01-15T10:00:00' },
          { name: '20240102_视频2_作者B', path: 'x', files: [], videos: [], videoCount: 2, mtime: '2024-02-20T10:00:00' },
        ]),
        getSyncCache: (kind) => Promise.resolve(kind === 'following' ? {
          items: [
            { sec_uid: 'uid1', nickname: '塔斯汀（中国汉堡）美食局', unique_id: 'tszghb001', following_count: 1485, follower_count: 23377142 },
            { sec_uid: 'uid2', nickname: '无敌灏克', unique_id: 'wudihaoke6666', following_count: 2402, follower_count: 20102325 },
            { sec_uid: 'uid3', nickname: '蓝月亮官方旗舰店', unique_id: 'lanmoon', following_count: 101, follower_count: 19829542 },
            { sec_uid: 'uid4', nickname: '至尊官方旗舰店', unique_id: 'zzofficial', following_count: 276, follower_count: 16314073 },
            { sec_uid: 'uid5', nickname: '瑜伽老师JJ', unique_id: 'JJYOGA', following_count: 298, follower_count: 12329504 },
            { sec_uid: 'uid6', nickname: '知识精选', unique_id: 'guytvbswe', following_count: 1612, follower_count: 6911919 },
          ],
          updated_at: new Date().toISOString(),
          count: 6,
        } : null),
        clearSyncCache: () => Promise.resolve(true),
        startDownload: () => Promise.resolve({ started: true }),
        startSync: ({ syncId, kind }) => {
          // 模拟关注同步进度，测试实时计数
          if (kind === 'following') {
            setTimeout(() => emit('syncProgress', { syncId, data: { event: 'sync_start', kind: 'following', limit: 2000 } }), 50);
            let total = 0;
            const interval = setInterval(() => {
              total += 20;
              emit('syncProgress', { syncId, data: { event: 'sync_progress', kind: 'following', total, added: total, status_code: 0, status_msg: '' } });
              if (total >= 120) {
                clearInterval(interval);
                emit('syncFinished', { syncId, code: 0, kind: 'following' });
              }
            }, 1500);
          }
          return Promise.resolve({ started: true });
        },
        startRelation: () => Promise.resolve({ started: true }),
        onThemeChanged: (fn) => handlers.themeChanged.push(fn),
        onShortcutTriggered: (fn) => handlers.shortcutTriggered.push(fn),
        onDownloadProgress: (fn) => handlers.downloadProgress.push(fn),
        onDownloadLog: (fn) => handlers.downloadLog.push(fn),
        onDownloadFinished: (fn) => handlers.downloadFinished.push(fn),
        onSyncProgress: (fn) => handlers.syncProgress.push(fn),
        onSyncLog: (fn) => handlers.syncLog.push(fn),
        onSyncFinished: (fn) => handlers.syncFinished.push(fn),
        onRelationProgress: (fn) => handlers.relationProgress.push(fn),
        onRelationLog: (fn) => handlers.relationLog.push(fn),
        onRelationFinished: (fn) => handlers.relationFinished.push(fn),
        onReportProgress: (fn) => handlers.reportProgress.push(fn),
        onReportLog: (fn) => handlers.reportLog.push(fn),
        onReportFinished: (fn) => handlers.reportFinished.push(fn),
        onTranscriptProgress: (fn) => handlers.transcriptProgress.push(fn),
        onTranscriptLog: (fn) => handlers.transcriptLog.push(fn),
        onTranscriptFinished: (fn) => handlers.transcriptFinished.push(fn),
        onCloudProgress: (fn) => handlers.cloudProgress.push(fn),
        onCloudLog: (fn) => handlers.cloudLog.push(fn),
        onCloudFinished: (fn) => handlers.cloudFinished.push(fn),
        startUserWorks: () => Promise.resolve({ started: true }),
        cancelUserWorks: () => {},
        onUserWorksProgress: (fn) => handlers.userWorksProgress.push(fn),
        onUserWorksLog: (fn) => handlers.userWorksLog.push(fn),
        onUserWorksFinished: (fn) => handlers.userWorksFinished.push(fn),
        minimize: () => {},
        maximize: () => {},
        close: () => {},
        isMaximized: () => Promise.resolve(false),
        selectFolder: () => Promise.resolve(null),
        openFolder: () => {},
        deleteArchive: () => Promise.resolve(true),
        openVideo: () => {},
        cancelDownload: () => {},
        cancelSync: () => {},
        cancelRelation: () => {},
        cancelReport: () => {},
        cancelTranscript: () => {},
        cancelCloud: () => {},
        exportReport: () => Promise.resolve({ started: true }),
        startTranscript: () => Promise.resolve({ started: true }),
        backupCloud: () => Promise.resolve({ started: true }),
        restoreCloud: () => Promise.resolve({ started: true }),
        loginWithBrowser: () => Promise.resolve({ success: false, reason: '测试环境' }),
      };
    })();
  </script>
  <script src="./app.js"></script>
  <script>
    // Force navigate to following page after Vue app is mounted and settings loaded
    function navigateToFollowing() {
      if (typeof store !== 'undefined' && store.initialized) {
        store.currentPage = 'following';
      } else {
        setTimeout(navigateToFollowing, 100);
      }
    }
    setTimeout(navigateToFollowing, 200);
  </script>
</body>
</html>
